schema: nornyx.profile_pack.v1
kind: profile
id: nornyx.builtin.agentic_repo_harness
name: agentic_repo_harness
display_name: Agentic Repo Harness
version: 1.0.0
compatible_core: '>=0.1 <=1.0'
status: candidate
purpose: Describe repo harness governance, local quality gates, and evidence collection.
domain: agentic_repo_control_plane
required_modules: []
required_blocks:
- project
- contexts
- agents
- harnesses
- policies
- evidence
- goals
recommended_blocks:
- graph
- contracts
- approvals
- budgets
- traces
- evals
default_policies:
- deny:
  - secrets_to_llm
  - production_write_without_approval
  require:
  - tests_if_code_changed
  - evidence_if_goal_completed
  id: safe_repo_edit
- require:
  - risk_check
  - evidence_check
  - approval_before_merge
  id: safe_review
required_evidence:
- id: starter_evidence
  type: artifact_set
  required: true
  artifact: evidence.required
default_evaluations:
- id: regression_eval
  metrics: &id001
  - tests_pass
  - no_policy_regression
  - evidence_complete
approval_requirements:
- id: human_owner
  required_roles: []
  eligible_roles: []
  denied_actor_types: []
  required_evidence: []
  actions: &id002
  - merge
  - policy_change
  - connector_write
  timing: unspecified
graph:
  node_kinds:
  - profile
  - context
  - agent
  - policy
  - harness
  - approval
  - budget
  - goal
  relationship_constraints: []
starter_fragments:
- target: document
  content:
    nornyx: '0.2'
    project:
      name: __NORNYX_PROJECT_NAME__
      profile: agentic_repo_harness
      purpose: Generated by nornyx init. Edit this file as the project source of truth.
      profile_pack:
        name: agentic_repo_harness
        version: v0.3
        core_surface: v0.2
        status: optional_profile
    intents:
    - name: ProjectIntent
      goal: Deliver __NORNYX_PROJECT_NAME__ through governed AI-assisted engineering.
    contexts:
    - name: RepoContext
      include:
      - README.md
      - docs/**/*.md
      - src/**/*
      - tests/**/*
      exclude:
      - .env
      - secrets/**
      - generated/**
      - '**/__pycache__/**'
      authority:
      - manifest.json
      - docs/spec/**/*.md
      - tests/**/*
      - chat_notes/**
      budget:
        max_tokens: 32000
        reserve_output_tokens: 4000
    agents:
    - name: Architect
      role: Design bounded goals and acceptance criteria
      skills:
      - SpecDesign
      policy: SafeRepoEdit
    - name: Builder
      role: Implement scoped changes with tests
      skills:
      - PatchBuild
      policy: SafeRepoEdit
    - name: Reviewer
      role: Review design, security, tests, and evidence
      skills:
      - Review
      policy: SafeReview
    skills:
    - name: SpecDesign
      purpose: Turn goals into spec and acceptance criteria
      input:
      - Goal
      output:
      - Spec
    - name: PatchBuild
      purpose: Produce small coherent patches
      input:
      - Spec
      output:
      - PatchDiff
    - name: Review
      purpose: Review patch, tests, policy, and evidence
      input:
      - PatchDiff
      output:
      - ReviewReport
    policies:
    - name: SafeRepoEdit
      deny:
      - secrets_to_llm
      - production_write_without_approval
      require:
      - tests_if_code_changed
      - evidence_if_goal_completed
    - name: SafeReview
      require:
      - risk_check
      - evidence_check
      - approval_before_merge
    harnesses:
    - name: StandardDevHarness
      context: RepoContext
      flow:
      - agent: Architect
        action: plan
      - agent: Builder
        action: implement
      - tool: tests
        action: run
      - agent: Reviewer
        action: review
      - tool: evidence
        action: pack
      gates:
      - tests.pass
      - policy.pass
      - evidence.exists
      - approval.before_merge
    evals:
    - name: RegressionEval
      metrics: *id001
    evidence:
      required:
      - patch.diff
      - test_report.json
      - risk_update.md
      - approval_log.json
    goals:
    - id: GOAL-001
      title: Bootstrap governed project baseline
      phase: v0.3
      goal: Create initial Nornyx-governed development baseline.
      scope:
      - project.nyx
      - profiles/agentic_repo_harness.yaml
      - docs/qa/evidence/GOAL-001/
      non_goals:
      - production deployment
      - external connector enablement
      - domain-specific runtime execution
      validation:
      - nornyx check project.nyx
      - pytest -q
      evidence: docs/qa/evidence/GOAL-001/
      approval: required before merge or release
      stop_rules:
      - stop on security ambiguity
      - stop after 3 failed validation attempts
    experimental:
      profile_pack:
        name: agentic_repo_harness
        domain: agentic_repo_control_plane
        required_blocks:
        - project
        - contexts
        - agents
        - harnesses
        - policies
        - evidence
        - goals
        recommended_blocks:
        - graph
        - contracts
        - approvals
        - budgets
        - traces
        - evals
        graph_node_kinds:
        - profile
        - context
        - agent
        - policy
        - harness
        - approval
        - budget
        - goal
        validation_rules:
        - harnesses are plans and gates, not arbitrary command execution
        - contract references declared graph nodes, approvals, and budgets
        - profile-specific harness defaults do not weaken core policy checks
        non_goals: &id003
        - live agent runtime
        - tool execution
        - MCP/A2A live connectors
        - LLM/model calls
        - automatic approvals
        - self-modification
        - production deployment
        - enterprise/regulated GOAL-100 promotion
        - general-purpose programming language features
    approvals:
    - name: HumanOwner
      required_for: *id002
    budgets:
    - name: DefaultBudget
      max_tokens: 100000
      max_tool_calls: 40
      max_runtime_minutes: 30
    graph:
      nodes:
      - id: profile.agentic_repo_harness
        kind: profile
        ref: agentic_repo_harness
      - id: context.repo
        kind: context
        ref: RepoContext
      - id: agent.builder
        kind: agent
        ref: Builder
      - id: policy.safe_repo_edit
        kind: policy
        ref: SafeRepoEdit
      - id: approval.human_owner
        kind: approval
        ref: HumanOwner
      - id: budget.default
        kind: budget
        ref: DefaultBudget
      - id: evidence.patch
        kind: evidence
        ref: patch.diff
      - id: goal.bootstrap
        kind: goal
        ref: GOAL-001
      edges:
      - from: profile.agentic_repo_harness
        to: context.repo
        relation: scopes_context
      - from: context.repo
        to: agent.builder
        relation: authorizes_context_for
      - from: policy.safe_repo_edit
        to: agent.builder
        relation: governs
      - from: agent.builder
        to: evidence.patch
        relation: must_produce
      - from: approval.human_owner
        to: goal.bootstrap
        relation: gates
      - from: budget.default
        to: goal.bootstrap
        relation: bounds
    contracts:
    - name: agentic_repo_harness_profile_contract
      nodes:
      - profile.agentic_repo_harness
      - context.repo
      - agent.builder
      - policy.safe_repo_edit
      - approval.human_owner
      - budget.default
      - evidence.patch
      - goal.bootstrap
      approval: HumanOwner
      budget: DefaultBudget
    guardrails:
    - name: NoSecretOutput
      validate:
      - no_secrets
      - schema_valid
    traces:
    - name: AgentTrace
      standard: OpenTelemetry.GenAI
      capture:
      - llm_call
      - tool_call
      - policy_decision
      - approval_event
validation_rules: []
compatibility:
  compatible_with:
  - ai_coding
  - ai_governance
  requires_review_with:
  - telecom_ops
  - business_ops
  - finance_ops
  legacy_v0_3:
    supported: true
    mode: exact_v0_3_view
    validation_rules:
    - harnesses are plans and gates, not arbitrary command execution
    - contract references declared graph nodes, approvals, and budgets
    - profile-specific harness defaults do not weaken core policy checks
    conformance:
      v1_readiness: stable_candidate
      migration: Use when harness gates and local evidence flows are first-class.
    core_concepts:
    - Intent
    - Agent
    - Policy
    - Eval
    - Approval
    - Evidence
    - Context
    - Artifact
    - Graph
    - Goal
    - Budget
    - Trace
    omitted_fields:
    - required_modules
    - default_policies
    - required_evidence
    - default_evaluations
    - approval_requirements
    - starter_fragments
    - validation_rules
    - compatibility
    - conflicts
    - provenance
    - integrity
    must_preserve: []
conflicts: []
migration_guidance: The v1 built-in is authoritative; the legacy v0.3 view remains exact.
non_goals: *id003
provenance:
  author: Nornyx maintainers
  source_tier: builtin
  source_revision: governance-extension-runtime-pr2
integrity:
  algorithm: sha256
  content_hash: sha256:a8b3b8bf47ebeb9c509190464949a500237781ac00547fb67dfcca78f1c18b05
