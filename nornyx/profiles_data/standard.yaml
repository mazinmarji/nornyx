schema: nornyx.profile_pack.v1
kind: profile
id: nornyx.builtin.standard
name: standard
display_name: Standard
version: 1.0.0
compatible_core: '>=0.1 <=1.0'
status: stable
purpose: Generate the established standard governed project starter.
domain: general_ai_engineering
required_modules: []
required_blocks:
- project
- intents
- contexts
- agents
- policies
- evidence
- goals
recommended_blocks:
- harnesses
- evals
default_policies:
- deny:
  - secrets_to_llm
  - production_write_without_approval
  require:
  - tests_if_code_changed
  - evidence_if_goal_completed
  id: safe_repo_edit
- require:
  - risk_check
  - evidence_check
  - approval_before_merge
  id: safe_review
required_evidence:
- id: starter_evidence
  type: artifact_set
  required: true
  artifact: evidence.required
default_evaluations:
- id: regression_eval
  metrics: &id001
  - tests_pass
  - no_policy_regression
  - evidence_complete
approval_requirements: []
graph:
  node_kinds: []
  relationship_constraints: []
starter_fragments:
- target: document
  content:
    nornyx: '0.1'
    project:
      name: __NORNYX_PROJECT_NAME__
      profile: standard
      purpose: Generated by nornyx init. Edit this file as the project source of truth.
    intents:
    - name: ProjectIntent
      goal: Deliver __NORNYX_PROJECT_NAME__ through governed AI-assisted engineering.
    contexts:
    - name: RepoContext
      include:
      - README.md
      - docs/**/*.md
      - src/**/*
      - tests/**/*
      exclude:
      - .env
      - secrets/**
      - generated/**
      - '**/__pycache__/**'
      authority:
      - manifest.json
      - docs/spec/**/*.md
      - tests/**/*
      - chat_notes/**
      budget:
        max_tokens: 32000
        reserve_output_tokens: 4000
    agents:
    - name: Architect
      role: Design bounded goals and acceptance criteria
      skills:
      - SpecDesign
      policy: SafeRepoEdit
    - name: Builder
      role: Implement scoped changes with tests
      skills:
      - PatchBuild
      policy: SafeRepoEdit
    - name: Reviewer
      role: Review design, security, tests, and evidence
      skills:
      - Review
      policy: SafeReview
    skills:
    - name: SpecDesign
      purpose: Turn goals into spec and acceptance criteria
      input:
      - Goal
      output:
      - Spec
    - name: PatchBuild
      purpose: Produce small coherent patches
      input:
      - Spec
      output:
      - PatchDiff
    - name: Review
      purpose: Review patch, tests, policy, and evidence
      input:
      - PatchDiff
      output:
      - ReviewReport
    policies:
    - name: SafeRepoEdit
      deny:
      - secrets_to_llm
      - production_write_without_approval
      require:
      - tests_if_code_changed
      - evidence_if_goal_completed
    - name: SafeReview
      require:
      - risk_check
      - evidence_check
      - approval_before_merge
    harnesses:
    - name: StandardDevHarness
      context: RepoContext
      flow:
      - agent: Architect
        action: plan
      - agent: Builder
        action: implement
      - tool: tests
        action: run
      - agent: Reviewer
        action: review
      - tool: evidence
        action: pack
      gates:
      - tests.pass
      - policy.pass
      - evidence.exists
      - approval.before_merge
    evals:
    - name: RegressionEval
      metrics: *id001
    evidence:
      required:
      - patch.diff
      - test_report.json
      - risk_update.md
      - approval_log.json
    goals:
    - id: GOAL-001
      title: Bootstrap governed project baseline
      phase: v0.1
      goal: Create initial Nornyx-governed development baseline.
      scope:
      - project.nyx
      - README.md
      - docs/qa/evidence/GOAL-001/
      non_goals:
      - production deployment
      - external connector enablement
      validation:
      - nornyx check project.nyx
      - pytest -q
      evidence: docs/qa/evidence/GOAL-001/
      approval: required before merge or release
      stop_rules:
      - stop on security ambiguity
      - stop after 3 failed validation attempts
validation_rules: []
compatibility:
  compatible_with: []
  requires_review_with: []
  legacy_v0_3:
    supported: true
    mode: exact_v0_3_view
    validation_rules:
    - generated starter document passes nornyx check
    conformance:
      v1_readiness: stable_candidate
      migration: Use the authoritative v1 built-in while preserving the established starter.
    core_concepts:
    - Intent
    - Agent
    - Policy
    - Eval
    - Approval
    - Evidence
    - Context
    - Artifact
    - Graph
    - Goal
    - Budget
    - Trace
    omitted_fields:
    - required_modules
    - default_policies
    - required_evidence
    - default_evaluations
    - approval_requirements
    - starter_fragments
    - validation_rules
    - compatibility
    - conflicts
    - provenance
    - integrity
    must_preserve: []
conflicts: []
migration_guidance: The v1 built-in is authoritative; the legacy v0.3 view remains exact.
non_goals:
- live agent runtime
- tool execution
- MCP/A2A live connectors
- LLM/model calls
- automatic approvals
- self-modification
- production deployment
- enterprise/regulated GOAL-100 promotion
- general-purpose programming language features
provenance:
  author: Nornyx maintainers
  source_tier: builtin
  source_revision: governance-extension-runtime-pr2
integrity:
  algorithm: sha256
  content_hash: sha256:62aab7d8e3a6e43f122e4fbe27b293cd6b943c2981eb91ac4f01416cf99e5d01
