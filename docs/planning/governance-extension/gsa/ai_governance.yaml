schema: nornyx.gsa_profile_matrix.v1
enforcement: advisory_document
profile: ai_governance
what_is_governed: [ai_policy_change, model_evidence, approval, exception]
why: Keep AI governance decisions evidenced and human-authorized.
owner: ai_governance_owner
who_may_act: [policy_author, evaluator, human_reviewer]
allowed: [propose_policy, supply_evidence, approve_change]
