name: release

# Publishes Nornyx to PyPI via Trusted Publishing (OIDC) — no API token stored
# anywhere. Publishing fires only when a GitHub Release is published. Manual
# dispatch runs the test job without deploying to PyPI.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install . pytest
      # python -m puts the checkout root on sys.path so the repository-root
      # `scripts` helper modules imported by the test suite are resolvable.
      - run: python -m pytest -q

  publish:
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed: PyPI verifies the OIDC identity of this workflow.
