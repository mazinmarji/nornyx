name: CI

# Automated checks for pull requests and main. This is intentionally separate
# from `nornyx-safe-dev-quality.yml`, which is a maintainer-run, manual-only
# (`workflow_dispatch`) quality pass and must stay that way.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Prove the advertised requires-python >=3.10 range, not just one version.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact candidate identity
        if: github.event_name == 'pull_request'
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install package
        run: python -m pip install -e ".[dev]" build twine
      - name: Run tests
        run: python -m pytest -q
      - name: Check candidate diff hygiene
        # Whitespace hygiene against the live PR base — no hardcoded historical SHA.
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Run installed-wheel no-network smoke
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name 'nornyx-*.whl' -print -quit)"
          test -n "$wheel"
          python scripts/test_wheel_install.py "$wheel"
      - name: Check a bundled example contract
        run: python -m nornyx.cli check examples/governed_delivery_control_plane.nyx

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact candidate identity
        if: github.event_name == 'pull_request'
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Public boundary
        run: python scripts/check-public-boundary.py
      - name: Compatibility migrations
        run: python scripts/check_compatibility_migrations.py
      - name: Agentic-network reference CI demonstration
        run: python scripts/agentic_network_ci.py

  native-frameworks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact candidate identity
        if: github.event_name == 'pull_request'
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package with native frameworks
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install "crewai==1.15.4" "langgraph==1.2.2"
      - name: Record framework versions and forbid skips
        run: |
          python -c "import crewai; print('crewai', crewai.__version__)"
          python -c "import importlib.metadata as m; print('langgraph', m.version('langgraph'))"
      - name: Native CrewAI and LangGraph integration tests
        env:
          CREWAI_DISABLE_TELEMETRY: "true"
          OTEL_SDK_DISABLED: "true"
          CREWAI_TRACING_ENABLED: "false"
          CREWAI_TESTING: "true"
        run: |
          python -m pytest \
            tests/test_agentic_crewai_native.py \
            tests/test_agentic_integrations.py \
            tests/test_crewai_nornyx_comparison.py \
            -v -rs
      - name: CrewAI x Nornyx A/B comparison (run + machine-check artifacts)
        env:
          CREWAI_DISABLE_TELEMETRY: "true"
          OTEL_SDK_DISABLED: "true"
          CREWAI_TRACING_ENABLED: "false"
          CREWAI_TESTING: "true"
        run: |
          python examples/crewai_nornyx_comparison/compare.py \
            --no-benchmark --out "$RUNNER_TEMP/crewai-nornyx-comparison"
          python examples/crewai_nornyx_comparison/ci_check_artifacts.py \
            "$RUNNER_TEMP/crewai-nornyx-comparison"
      - name: Isolated published Nornyx 1.7.0 verification (installs from PyPI)
        run: |
          python examples/crewai_nornyx_comparison/verify_published_nornyx.py \
            --out "$RUNNER_TEMP/nornyx-published-verify"

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact candidate identity
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e ".[dev]" build twine
      - name: Run tests
        run: python -m pytest -q
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Run installed-wheel no-network smoke
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name 'nornyx-*.whl' -print -quit)"
          test -n "$wheel"
          python scripts/test_wheel_install.py "$wheel"
