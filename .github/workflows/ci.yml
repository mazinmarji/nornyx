name: CI

# Automated checks for pull requests and main. This is intentionally separate
# from `nornyx-safe-dev-quality.yml`, which is a maintainer-run, manual-only
# (`workflow_dispatch`) quality pass and must stay that way.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Verify exact candidate identity
        if: github.event_name == 'pull_request'
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e ".[dev]" build twine
      - name: Run tests
        run: python -m pytest -q
      - name: Check candidate diff hygiene
        run: git diff --check 95952226999327458c6fea81cb32d82539bcae5b...HEAD
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Run installed-wheel no-network smoke
        shell: bash
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name 'nornyx-*.whl' -print -quit)"
          test -n "$wheel"
          python scripts/test_wheel_install.py "$wheel"
      - name: Check a bundled example contract
        run: python -m nornyx.cli check examples/governed_delivery_control_plane.nyx
